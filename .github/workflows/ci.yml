name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── Turborepo Remote Cache ──────────────────────────────────────────
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: turbo-

      # ─── Affected Lint & Typecheck (Fail Fast on any warning) ───────────
      - name: Lint (affected)
        run: pnpm turbo run lint --filter=[HEAD^1] --no-daemon
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck --filter=[HEAD^1] --no-daemon
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ─── Tests ───────────────────────────────────────────────────────────
      - name: Test (affected)
        run: pnpm turbo run test --filter=[HEAD^1] --no-daemon
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      # ─── Build ───────────────────────────────────────────────────────────
      - name: Build (affected)
        run: pnpm turbo run build --filter=[HEAD^1] --no-daemon
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
